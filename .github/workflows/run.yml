name: Run Trading Bot

on:
  workflow_dispatch:   # ✅ enables manual run
  schedule:
    - cron: "30 3 * * 1-5"

jobs:
  run-bot:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Setup Node
        uses: actions/setup-node@v3
        with:
          node-version: "18"

      - name: Install dependencies
        run: npm install

      - name: Run bot
        run: node index.js
